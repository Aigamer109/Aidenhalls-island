<style>
body {
  margin: 0;
  font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
  overflow: hidden;
}

/* INTRO STUFF */
#introScene {
  position: fixed;
  width: 100%;
  height: 100%;
  background: linear-gradient(#87CEEB, #4ec0ff);
  overflow: hidden;
  z-index: 100;
  transform-origin: center center;
  transition: transform 4s ease-in-out;
}

.ocean {
  position: absolute;
  bottom: 0;
  width: 100%;
  height: 45%;
  background: linear-gradient(#1e90ff, #0066cc);
  animation: wave 3s infinite alternate ease-in-out;
}
@keyframes wave {
  from { transform: translateY(0px); }
  to { transform: translateY(8px); }
}

.island {
  position: absolute;
  bottom: 40%;
  left: 60%;
  width: 200px;
  height: 100px;
  background: #8B4513;
  border-radius: 50% 50% 30% 30%;
}
.grass {
  position: absolute;
  top: -30px;
  width: 200px;
  height: 50px;
  background: #2ecc40;
  border-radius: 50%;
}
.tree-trunk {
  position: absolute;
  bottom: 50px;
  left: 90px;
  width: 15px;
  height: 60px;
  background: #5a381e;
}
.tree-leaves {
  position: absolute;
  bottom: 90px;
  left: 65px;
  width: 70px;
  height: 70px;
  background: #228B22;
  border-radius: 50%;
}

.boat {
  position: absolute;
  bottom: 20%;
  left: -200px;
  width: 120px;
  height: 40px;
  animation: sail 8s linear forwards, bob 2s infinite ease-in-out alternate;
}
@keyframes sail {
  from { left: -200px; }
  to { left: 50%; }
}
@keyframes bob {
  from { transform: translateY(0px); }
  to { transform: translateY(6px); }
}
.boat-body { width: 120px; height: 30px; background: #654321; border-radius: 0 0 40px 40px; }
.mast { position: absolute; bottom: 30px; left: 55px; width: 5px; height: 60px; background: black; }
.sail { position: absolute; bottom: 60px; left: 60px; width: 0; height: 0; border-left: 40px solid white; border-top: 30px solid transparent; border-bottom: 30px solid transparent; }

.fade {
  position: fixed;
  top:0; left:0; width:100%; height:100%;
  background:black; opacity:0;
  transition: opacity 2s ease;
  display:flex; align-items:center; justify-content:center;
  z-index:200;
}
.fade img {
  width:100%; height:100%; object-fit:cover;
  opacity:0; transition: opacity 2s ease;
}

/* CLICK TO START OVERLAY */
#clickOverlay {
  position: fixed;
  top:0; left:0; width:100%; height:100%;
  background: rgba(0,0,0,0.7);
  color:white;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:32px;
  cursor:pointer;
  z-index:300;

/* MAIN WEBSITE */

.game-list { display:flex; flex-direction:column; gap:20px; max-width:400px; margin:40px auto; }
.game-button {

  border-radius:8px; cursor:pointer; font-size:18px; font-weight:bold;
  transition: transform 0.2s, background 0.3s;
}
.game-button:hover { background:#45a049; transform: scale(1.05); }
</style>

<script>
const fade = document.getElementById("fade");
const img = document.getElementById("imageDisplay");
const intro = document.getElementById("introScene");
const main = document.getElementById("mainSite");
const clickOverlay = document.getElementById("clickOverlay");
const introSound = document.getElementById("introSound");

// --- PLAYLIST LOGIC ---
const playlist = [
  "https://files.catbox.moe/netb3b", // Song 1
  "https://files.catbox.moe/vf4z9n",                      // Replace with your links
  "https://files.catbox.moe/klbtjp",
];
let currentTrack = 0;

// Function to play next song and loop back to start
introSound.addEventListener('ended', () => {
  currentTrack++;
  if (currentTrack >= playlist.length) {
    currentTrack = 0; // Loop back to the beginning
  }
  introSound.src = playlist[currentTrack];
  introSound.play();
});
// ----------------------

function goToGame(url){ window.location = url; }

clickOverlay.addEventListener('click', () => {
  clickOverlay.remove();
  introSound.play().catch(console.log);

  // Start cinematic
  intro.style.transform = "scale(2) translate(-15%, -10%)";

  setTimeout(() => {
    fade.style.opacity = "1";
    setTimeout(() => {
      img.src = "Assets/exposed.png";
      img.style.opacity = "1";
      setTimeout(() => {
        img.style.opacity = "0";
        setTimeout(() => {
          img.src = "Assets/Aigamer.png";
          img.style.opacity = "1";
          setTimeout(() => {
            img.style.opacity = "0";
            fade.style.opacity = "0";
            setTimeout(() => {
              intro.remove();
              fade.remove();
              main.style.opacity = "1";
              document.body.style.overflow = "auto";
              // Note: introSound will keep playing/looping in the background
            },2000);
          },3000);
        },2000);
      },3000);
    },2000);
  },4000);
}, {once:true});

</script>
