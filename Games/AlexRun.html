<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Alex Run</title>
    <style>
        body{margin:0;overflow:hidden;background:#111;font-family:sans-serif;}
        canvas{display:block;}
        #score{position:absolute;top:10px;left:10px;color:white;font-size:20px;z-index:2;display:none;}
        #ultimateText{ position:absolute; top:50%; left:50%; transform:translate(-50%,-50%) rotate(-20deg); font-size:120px; font-weight:bold; color:red; opacity:0; pointer-events:none; text-shadow:0 0 20px red,0 0 40px red,0 0 60px red; z-index:3; transition:opacity .2s; }
        #orbitIndicator, #zoomIndicator{ position:absolute; left:10px; font-size:18px; font-weight:bold; display:none; }
        #orbitIndicator{ bottom:10px; color:cyan; }
        #zoomIndicator{ bottom:30px; color:yellow; }

        #menu {
            position: absolute; top:0; left:0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); display: flex; flex-direction: column;
            justify-content: center; align-items: center; z-index: 10; color: white;
        }
        h1 { font-size: 80px; margin-bottom: 20px; color: #ff4081; text-shadow: 0 0 20px #ff4081; }
        .btn-group { display: flex; gap: 15px; flex-wrap: wrap; justify-content: center; }
        .menu-btn {
            padding: 15px 30px; font-size: 18px; cursor: pointer;
            background: #222; color: white; border: 2px solid #ff4081;
            border-radius: 8px; transition: 0.3s;
        }
        .menu-btn:hover { background: #ff4081; transform: scale(1.05); }
        .special-btn { border-color: #00f2ff; text-shadow: 0 0 5px #00f2ff; }

        /* Dialog Styling */
        dialog { background:#222; color:white; border:2px solid #ff4081; border-radius:10px; padding:30px; text-align:center; }
        dialog::backdrop { background: rgba(0,0,0,0.8); }
        .dialog-btns { display: flex; gap: 10px; justify-content: center; margin-top: 20px; }
        .dialog-btn { padding: 10px 20px; border-radius: 5px; border: none; cursor: pointer; color: white; font-weight: bold; }
        .btn-retry { background: #4caf50; }
        .btn-menu { background: #ff4081; }
    </style>
</head>
<body>

    <div id="menu">
        <h1>ALEX RUN</h1>
        <div class="btn-group">
            <button class="menu-btn" onclick="startGame('classic')">Classic</button>
            <button class="menu-btn" onclick="startGame('hardcore')">Hardcore</button>
            <button class="menu-btn special-btn" onclick="startGame('double')">Double Trouble</button>
        </div>
    </div>

    <div id="score">Score: 0</div>
    <div id="ultimateText">ULTIMATE</div>
    <div id="orbitIndicator">Orbit Mode: OFF</div>
    <div id="zoomIndicator">Zoom: 1.0x</div>
    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        let score = 0, keys = {}, ultimate = false, shake = 0, trail = [], orbitMode = false, zoom = 1.0, gameRunning = false, currentMode = 'classic';

        const alexImg = new Image(); alexImg.src = "ALEX.png";
        const carlinImg = new Image(); carlinImg.src = "../Assets/Carlin.png"; 

        let kart = { x: 50, y: 50, vx: 0, vy: 0, width: 50, height: 30, friction: 0.995, thrust: 0.3 };
        
        let alex = { x: 0, y: 0, vx:0, vy:0, width: 250, height: 200, hitbox: 120, img: alexImg };
        let carlin = { x: 0, y: 0, vx:0, vy:0, width: 250, height: 200, hitbox: 120, img: carlinImg };
        let npcs = [];

        function startGame(mode) {
            currentMode = mode;
            npcs = [alex];
            if(mode === 'double') npcs.push(carlin);
            
            document.getElementById("menu").style.display = "none";
            document.getElementById("score").style.display = "block";
            document.getElementById("orbitIndicator").style.display = "block";
            document.getElementById("zoomIndicator").style.display = "block";
            resetGame();
            gameRunning = true;
        }

        window.addEventListener("keydown", e=>{
            keys[e.key] = true;
            if(e.key.toLowerCase()==="o"){
                orbitMode = !orbitMode;
                document.getElementById("orbitIndicator").innerText = "Orbit Mode: " + (orbitMode ? "ON":"OFF");
            }
            if(e.key==="+") { zoom *= 1.1; updateZoom(); }
            if(e.key==="-") { zoom /= 1.1; updateZoom(); }
        });
        window.addEventListener("keyup", e=> keys[e.key]=false);

        function updateZoom(){ document.getElementById("zoomIndicator").innerText = "Zoom: " + zoom.toFixed(2) + "x"; }

        function applyGravity(subject, attractor, strength) {
            let dx = attractor.x - subject.x;
            let dy = attractor.y - subject.y;
            let distSq = dx*dx + dy*dy;
            if(distSq < 100) return; 
            let force = strength / distSq;
            subject.vx += (dx / Math.sqrt(distSq)) * force;
            subject.vy += (dy / Math.sqrt(distSq)) * force;
        }

        function updatePhysics(){
            if(keys["w"]||keys["ArrowUp"]) kart.vy -= kart.thrust;
            if(keys["s"]||keys["ArrowDown"]) kart.vy += kart.thrust;
            if(keys["a"]||keys["ArrowLeft"]) kart.vx -= kart.thrust;
            if(keys["d"]||keys["ArrowRight"]) kart.vx += kart.thrust;
            if(!orbitMode){ kart.vx *= kart.friction; kart.vy *= kart.friction; }

            npcs.forEach(npc => {
                let g = (currentMode === 'hardcore') ? 30000 : 15000;
                if(ultimate) g *= 3;
                applyGravity(kart, npc, g);

                if(currentMode === 'double') {
                    let other = (npc === alex) ? carlin : alex;
                    applyGravity(npc, other, 5000); 
                    npc.vx *= 0.98; npc.vy *= 0.98; 
                }

                let predict = 20;
                let dx = (kart.x + kart.vx*predict) - npc.x;
                let dy = (kart.y + kart.vy*predict) - npc.y;
                let dist = Math.sqrt(dx*dx + dy*dy);
                let speed = (currentMode === 'hardcore') ? 4 : 2;
                
                npc.x += (dx/dist) * speed + npc.vx;
                npc.y += (dy/dist) * speed + npc.vy;
            });

            kart.x += kart.vx; kart.y += kart.vy;
            let bX = canvas.width/zoom, bY = canvas.height/zoom;
            if(kart.x < 0 || kart.x > bX) kart.vx *= -0.5;
            if(kart.y < 0 || kart.y > bY) kart.vy *= -0.5;
            kart.x = Math.max(0, Math.min(bX, kart.x));
            kart.y = Math.max(0, Math.min(bY, kart.y));

            trail.push({x:kart.x, y:kart.y});
            if(trail.length > 150) trail.shift();
        }

        function checkCollisions(){
            npcs.forEach(npc => {
                let dist = Math.sqrt((kart.x-npc.x)**2 + (kart.y-npc.y)**2);
                if(dist < npc.hitbox) {
                    gameRunning = false;
                    document.getElementById("alertText").innerText = `Game Over! ${npc === alex ? 'Alex' : 'Daniel'} Ate you!`;
                    document.getElementById("gameAlert").showModal();
                }
            });
        }

        function resetGame(){
            score = 0;
            kart.x = 50; kart.y = 50; kart.vx = 0; kart.vy = 0;
            alex.x = (canvas.width/zoom) * 0.8; alex.y = (canvas.height/zoom) * 0.2;
            carlin.x = (canvas.width/zoom) * 0.8; carlin.y = (canvas.height/zoom) * 0.8;
            alex.vx = 0; alex.vy = 0; carlin.vx = 0; carlin.vy = 0;
            trail = [];
        }

        function draw(){
            ctx.clearRect(0,0,canvas.width,canvas.height);
            ctx.save();
            ctx.translate(canvas.width/2 - kart.x*zoom, canvas.height/2 - kart.y*zoom);
            ctx.scale(zoom, zoom);

            if(ultimate) ctx.translate((Math.random()-0.5)*shake, (Math.random()-0.5)*shake);

            trail.forEach((t, i) => {
                ctx.fillStyle = `rgba(0,255,255,${i/trail.length*0.4})`;
                ctx.fillRect(t.x-3, t.y-3, 6, 6);
            });

            npcs.forEach(npc => ctx.drawImage(npc.img, npc.x - npc.width/2, npc.y - npc.height/2, npc.width, npc.height));
            
            ctx.fillStyle = "lime";
            ctx.fillRect(kart.x - 25, kart.y - 15, 50, 30);
            
            ctx.strokeStyle = "white"; ctx.lineWidth = 2;
            ctx.strokeRect(0, 0, canvas.width/zoom, canvas.height/zoom);
            ctx.restore();
        }

        function loop(){
            requestAnimationFrame(loop);
            if(!gameRunning) return;
            updatePhysics();
            checkCollisions();
            draw();
            score++;
            document.getElementById("score").innerText = "Score: " + score;
            if(shake > 0) shake *= 0.9;
        }
        loop();

        function playAgain() {
            document.getElementById("gameAlert").close();
            startGame(currentMode);
        }

        function returnToMenu() {
            document.getElementById("gameAlert").close();
            document.getElementById("menu").style.display = "flex";
            document.getElementById("score").style.display = "none";
            document.getElementById("orbitIndicator").style.display = "none";
            document.getElementById("zoomIndicator").style.display = "none";
            gameRunning = false;
        }

        setInterval(() => { if(gameRunning) { shake = 15; ultimate = true; document.getElementById("ultimateText").style.opacity=1; setTimeout(()=>{ultimate=false; document.getElementById("ultimateText").style.opacity=0;}, 5000); } }, 60000);
    </script>

    <dialog id="gameAlert">
        <h2 id="alertText"></h2>
        <div class="dialog-btns">
            <button class="dialog-btn btn-retry" onclick="playAgain()">Play Again</button>
            <button class="dialog-btn btn-menu" onclick="returnToMenu()">Main Menu</button>
        </div>
    </dialog>
</body>
</html>
