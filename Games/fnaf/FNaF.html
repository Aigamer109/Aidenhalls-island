<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>FNAA</title>
    <style>
       body {
    margin: 0;
    background: #000;
    color: #fff;
    font-family: 'Courier New', monospace;
    overflow: hidden;
    user-select: none;

    display: flex;
    align-items: center;
    justify-content: center;
    height: 100vh;
}
       #game-container {
    width: 100vw;
    height: 100vh;
    max-width: 1200px;
    max-height: 700px;
    aspect-ratio: 1200 / 700;

    position: relative;
    margin: auto;

    border: 4px solid #333;
    background: #111;
    overflow: hidden;
}
        
        /* Main Menu */
        #main-menu { position: absolute; inset: 0; background: #000; z-index: 200; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        #main-menu h1 { font-size: 60px; color: #800; text-shadow: 3px 3px #333; margin-bottom: 10px; }
        #night-indicator { font-size: 24px; margin-bottom: 30px; color: #aaa; }
        .menu-btn { padding: 15px 50px; background: #1a1a1a; border: 2px solid #fff; color: #fff; cursor: pointer; font-size: 22px; transition: 0.3s; }
        .menu-btn:hover { background: #fff; color: #000; }

        /* Office Setup */
        #office { width: 100%; height: 100%; position: relative; background: url('O1.png') no-repeat center/cover; }

        /* Dark Gray Sliding Doors */
        .door { position: absolute; top: 0; width: 120px; height: 100%; background: #2c2c2c; border: 5px solid #1a1a1a; transition: transform 0.4s ease-in; z-index: 10; transform: translateY(-100%); }
        #door-left { left: 0; }
        #door-right { right: 0; }
        .door.closed { transform: translateY(0); }
        
        /* Flashing Lights */
        .light-overlay { position: absolute; top: 0; width: 250px; height: 100%; opacity: 0; pointer-events: none; z-index: 5; }
        #light-l { left: 120px; background: linear-gradient(to right, rgba(255,255,220,0.3), transparent); }
        #light-r { right: 120px; background: linear-gradient(to left, rgba(255,255,220,0.3), transparent); }
        .flashing { animation: flash-anim 0.08s infinite; opacity: 1 !important; }
        @keyframes flash-anim { 0% { opacity: 0.1; } 50% { opacity: 0.6; } 100% { opacity: 0.1; } }

        /* Camera Screen */
        #cam-overlay { display: none; position: absolute; inset: 0; background: #000; z-index: 20; }
        #cam-img { width: 100%; height: 100%; background-size: cover; background-position: center; }
        #static-fx { position: absolute; inset: 0; background: url('https://media2.giphy.com/media/v1.Y2lkPTZjMDliOTUyYnFkNjNsZ25lMnQ2aXprbmE3azA1OTI5N21zanUwbGRwczgwc3ViZiZlcD12MV9naWZzX3NlYXJjaCZjdD1n/XuBNdP9Pb7W9i/giphy.gif'); opacity: 0; pointer-events: none; z-index: 25; }

        /* Map - Top Right of Cam Screen */
        #map-container { position: absolute; top: 90px; right: 15px; width: 240px; height: 220px; background: rgba(0,0,0,0.85); border: 2px solid #fff; z-index: 30; }
        #map-svg { position: absolute; top: 0; left: 0; width: 100%; height: 100%; stroke: white; stroke-width: 2; fill: none; }
        .map-node { position: absolute; width: 40px; height: 28px; background: #222; border: 1px solid #fff; font-size: 11px; display: flex; align-items: center; justify-content: center; cursor: pointer; z-index: 31; }
        .map-node.active { background: #0f0; color: #000; font-weight: bold; }
        
        #node-1 { top: 10px; left: 10px; } #node-3 { top: 10px; right: 10px; }
        #node-2 { top: 50px; left: 100px; } 
        #node-4 { top: 100px; left: 20px; } #node-5 { top: 100px; right: 20px; }
        #node-6 { top: 150px; left: 20px; } #node-7 { top: 150px; right: 20px; }
        #node-you { bottom: 10px; left: 90px; width: 60px; background: #0f0; color: #000; font-weight: bold; }

        /* HUD & Controls */
        .hud { position: absolute; padding: 10px; z-index: 40; background: rgba(0,0,0,0.6); }
        .ctrl { position: absolute; width: 75px; height: 45px; background: #333; border: 2px solid #fff; cursor: pointer; z-index: 50; color: white; font-size: 12px; font-weight: bold; }
        #btn-cam { bottom: 10px; left: 50%; transform: translateX(-50%); width: 180px; height: 40px; }

        /* Jumpscare */
        #jumpscare { display: none; position: absolute; inset: 0; z-index: 300; background: #000; text-align: center; }
        #js-img { height: 100%; transform: scale(1.4); animation: js-shake 0.05s infinite; }
        #death-text { position: absolute; bottom: 60px; width: 100%; color: red; font-size: 35px; font-weight: bold; text-shadow: 2px 2px #000; }
        @keyframes js-shake { 0% { transform: scale(1.4) translate(5px, 5px); } 50% { transform: scale(1.45) translate(-5px, -5px); } 100% { transform: scale(1.4) translate(5px, 5px); } }
    </style>
</head>
<body>

<div id="game-container">
    <div id="main-menu">
        <h1>FIVE NIGHTS AT ALEX'S</h1>
        <div id="night-indicator">Night 1</div>
        <button class="menu-btn" onclick="startGame()">NEW GAME</button>
    </div>

    <div id="office">
        <div id="door-left" class="door"></div>
        <div id="door-right" class="door"></div>
        <div id="light-l" class="light-overlay"></div>
        <div id="light-r" class="light-overlay"></div>
    </div>

    <div id="cam-overlay">
        <div id="cam-img"></div>
        <div id="static-fx"></div>
        <div id="map-container">
            <svg id="map-svg">
                <line x1="30" y1="25" x2="120" y2="65" />
                <line x1="210" y1="25" x2="120" y2="65" />
                <line x1="30" y1="25" x2="40" y2="115" />
                <line x1="210" y1="25" x2="200" y2="115" />
                <line x1="40" y1="115" x2="200" y2="115" /> <!-- R4-R5 Connection -->
                <line x1="40" y1="115" x2="40" y2="165" />
                <line x1="200" y1="115" x2="200" y2="165" />
            </svg>
            <div id="node-1" class="map-node" onclick="setCam(1)">R1</div>
            <div id="node-2" class="map-node" onclick="setCam(2)">R2</div>
            <div id="node-3" class="map-node" onclick="setCam(3)">R3</div>
            <div id="node-4" class="map-node" onclick="setCam(4)">R4</div>
            <div id="node-5" class="map-node" onclick="setCam(5)">R5</div>
            <div id="node-6" class="map-node" onclick="setCam(6)">R6</div>
            <div id="node-7" class="map-node" onclick="setCam(7)">R7</div>
            <div id="node-you" class="map-node">YOU</div>
        </div>
    </div>

    <div class="hud" style="top:10px; right:10px; font-size:24px;"><span id="time-val">12</span> AM</div>
    <div class="hud" style="bottom:10px; left:10px;">Power: <span id="power-val">100</span>%</div>
    
    <button class="ctrl" style="bottom:130px; left:10px;" onclick="toggleDoor('l')">DOOR L</button>
    <button class="ctrl" style="bottom:75px; left:10px;" onmousedown="toggleLight('l', true)" onmouseup="toggleLight('l', false)">LIGHT L</button>
    <button class="ctrl" style="bottom:130px; right:10px;" onclick="toggleDoor('r')">DOOR R</button>
    <button class="ctrl" style="bottom:75px; right:10px;" onmousedown="toggleLight('r', true)" onmouseup="toggleLight('r', false)">LIGHT R</button>
    <button id="btn-cam" class="ctrl" onclick="toggleCams()">MONITOR</button>

    <div id="jumpscare">
        <img src="ALEX.png" id="js-img">
        <div id="death-text"></div>
    </div>
</div>

<script>
let night = 1, hour = 0, power = 100, isCamOpen = false, currentCam = 1;
let doorL = false, doorR = false, lightL = false, lightR = false, gameActive = false;
let gameLoop, aiLoop, timeCounter = 0;

let ai = {
    skinny: { room: 1, type: "Skinny Alex", css: "width:45px; height:100%; left:50%; transform:translateX(-50%);", side: 'l' },
    short:  { room: 2, type: "Short Alex", css: "width:380px; height:70px; bottom:10px; left:10px;", side: 'l' },
    normal: { room: 3, type: "Normal Alex", css: "width:200px; height:280px; bottom:20px; right:10px;", side: 'r' }
};

const rooms = {
    1: [2, 4], 2: [1, 3], 3: [2, 5],
    4: [1, 5, 6], 5: [3, 4, 7],
    6: [4, 'OFFICE'], 7: [5, 'OFFICE']
};

function startGame() {
    document.getElementById('main-menu').style.display = 'none';
    gameActive = true; power = 100; hour = 0; timeCounter = 0;
    ai.skinny.room = 1; ai.short.room = 2; ai.normal.room = 3;
    updateHUD();
    gameLoop = setInterval(updateGame, 500);
    aiLoop = setInterval(moveAI, 7000 - (night * 500)); 
}

function updateGame() {
    if (!gameActive) return;
    
    timeCounter++;
    if (timeCounter >= 45) {
        timeCounter = 0;
        hour++;
        if (hour >= 6) winNight();
    }
    
    let usage = 0.1;
    if (doorL) usage += 0.2;
    if (doorR) usage += 0.2;
    if (lightL || lightR) usage += 0.3;
    if (isCamOpen) usage += 0.15;
    power -= usage;
    
    if (power <= 0) { power = 0; triggerJumpscare("The Dark"); }
    updateHUD();
}

function moveAI() {
    if (!gameActive) return;
    for (let key in ai) {
        let current = ai[key].room;
        if (current === 'OFFICE') {
            // If Alex is in the office, check if they are visible
            if ((key === 'skinny' && lightL && !doorL) || (key === 'short' && lightR && !doorR) || (key === 'normal' && lightR && !doorR)) {
                ai[key].room = 1; // Move Alex back if blocked by light or door
                continue;
            }
            let blocked = (ai[key].side === 'l' ? doorL : doorR);
            if (blocked) {
                ai[key].room = 1; // Move Alex back to a safe room if door is closed
            } else {
                // If Alex reaches the office and the door is open, trigger jump scare
                triggerJumpscare(ai[key].type);
            }
        } else {
            let options = rooms[current];
            ai[key].room = options[Math.floor(Math.random() * options.length)];
        }
    }
    if (isCamOpen) updateCamView(); // Update camera view if open
}

function triggerJumpscare(who) {
    gameActive = false;
    clearInterval(gameLoop); clearInterval(aiLoop);
    document.getElementById('jumpscare').style.display = 'block';
    document.getElementById('death-text').innerText = who.toUpperCase() + "ATE you. i tried to make a jumpscare but alex cant jump.";
    setTimeout(() => { location.reload(); }, 3500);
}

function winNight() {
    gameActive = false;
    clearInterval(gameLoop); clearInterval(aiLoop);
    alert("6 AM! You survived Night " + night);
    night++;
    if (night > 5) { alert("YOU BEAT THE GAME!"); night = 1; }
    document.getElementById('night-indicator').innerText = "Night " + night;
    document.getElementById('main-menu').style.display = 'flex';
}

function updateHUD() {
    document.getElementById('time-val').innerText = hour === 0 ? 12 : hour;
    document.getElementById('power-val').innerText = Math.floor(power);
}

function toggleDoor(side) {
    if (side === 'l') { doorL = !doorL; document.getElementById('door-left').classList.toggle('closed', doorL); }
    else { doorR = !doorR; document.getElementById('door-right').classList.toggle('closed', doorR); }
}

function toggleLight(side, state) {
    if (side === 'l') { lightL = state; document.getElementById('light-l').classList.toggle('flashing', state); }
    else { lightR = state; document.getElementById('light-r').classList.toggle('flashing', state); }
}

function toggleCams() {
    isCamOpen = !isCamOpen;
    document.getElementById('cam-overlay').style.display = isCamOpen ? 'block' : 'none';
    if (isCamOpen) { triggerStatic(); updateCamView(); }
}

function triggerStatic() {
    const s = document.getElementById('static-fx');
    s.style.opacity = "0.7";
    setTimeout(() => { s.style.opacity = "0"; }, 250);
}

function setCam(n) {
    currentCam = n;
    document.querySelectorAll('.map-node').forEach(node => node.classList.remove('active'));
    document.getElementById(`node-${n}`).classList.add('active');
    triggerStatic();
    updateCamView();
}

function updateCamView() {
    const camImg = document.getElementById('cam-img');
    camImg.style.backgroundImage = `url('R${currentCam}.png')`;
    camImg.innerHTML = ""; // Clear any existing visuals

    // Show Alex when they are in the current camera room
    for (let key in ai) {
        if (ai[key].room === currentCam) {
            const visual = document.createElement('div');
            visual.style = `position:absolute; background:url('ALEX.png') no-repeat center/100% 100%; ${ai[key].css}`;
            camImg.appendChild(visual);
        }
    }
}
setCam(1);
</script>
</body>
</html>
