<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>AHIPP - Projects</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 50px 20px;
            margin: 0;
        }

        h1 { color: #333; }

        /* The container for all your links */
        .link-list {
            display: flex;
            flex-direction: column;
            gap: 15px; /* Space between buttons */
            width: 100%;
            max-width: 400px;
        }

        /* Standard button style */
        .btn {
            display: block;
            padding: 15px;
            text-align: center;
            background-color: white;
            color: #333;
            text-decoration: none;
            border-radius: 8px;
            border: 2px solid #ddd;
            font-weight: bold;
            transition: all 0.2s ease;
        }

        /* Hover effect */
        .btn:hover {
            background-color: #007bff;
            color: white;
            border-color: #0056b3;
            transform: translateY(-2px);
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }

        /* Special style for the Home button */
        .home-btn {
            margin-bottom: 30px;
            background-color: #333;
            color: white;
        }
    </style>
</head>
<body>

    <a href="AHIPP.html" class="btn home-btn">← Back to Main Page</a>

    <h1>AHIPP Project Directory</h1>
    <p>Click a button below to visit a project page:</p>

    <div class="link-list">
        <!-- Add new buttons by copying the line below -->
        
        <a href="https://evilzyngaming.neocities.org" class="btn">NATHANS WEBSITE</a>
        <a href="project2.html" class="btn">Placeholder Project 2</a>
        <a href="project3.html" class="btn">Placeholder Project 3</a>
        <a href="project4.html" class="btn">Placeholder Project 4</a>
        <a href="project5.html" class="btn">Placeholder Project 5</a>
        <!-- End of list -->
    </div>

</body>
</html>
