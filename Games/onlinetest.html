<!DOCTYPE html>
<html>
<head>
    <title>P2P Cube Battle</title>
    <style>
        body { margin: 0; overflow: hidden; background: #1a1a1a; font-family: sans-serif; color: white; }
        #ui { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; background: rgba(0,0,0,0.9); z-index: 100; }
        .input-group { margin: 10px; }
        input { padding: 12px; border-radius: 5px; border: none; width: 200px; }
        button { padding: 12px 24px; cursor: pointer; background: #00ffcc; border: none; font-weight: bold; border-radius: 5px; color: #1a1a1a; }
        
        #game-info { position: fixed; top: 10px; left: 10px; pointer-events: none; opacity: 0.7; }
        .player { position: absolute; width: 50px; height: 50px; transition: transform 0.05s linear; }
        .cube { width: 100%; height: 100%; border: 2px solid white; box-sizing: border-box; box-shadow: 0 0 15px rgba(255,255,255,0.2); }
        .nametag { position: absolute; top: -25px; width: 150px; left: -50px; text-align: center; font-size: 14px; font-weight: bold; text-shadow: 1px 1px #000; }
        .laser { position: absolute; height: 4px; pointer-events: none; z-index: 5; transform-origin: left center; box-shadow: 0 0 10px white; }
        #score-board { position: fixed; top: 10px; right: 10px; background: rgba(0,0,0,0.5); padding: 10px; border-radius: 5px; border: 1px solid #444; }
    </style>
</head>
<body>

    <div id="ui">
        <h1>CUBE BATTLE</h1>
        <div class="input-group"><input type="text" id="name-input" placeholder="Enter Nickname" maxlength="12"></div>
        <div class="input-group"><input type="text" id="room-input" placeholder="Room Name"></div>
        <button onclick="startGame()">JOIN BATTLE</button>
    </div>

    <div id="game-info">WASD to Move | Click to Shoot</div>
    <div id="score-board">Score: <span id="my-score">0</span></div>
    <div id="game-world"></div>

<script type="module">
    import { joinRoom } from 'https://esm.run/trystero/torrent';

    const config = { appId: 'cube-battle-unique-id-99' };
    let room, sendMove, sendShoot, sendHit;
    const myId = Math.random().toString(36).substr(2, 9);
    let myName = "Player";
    let myScore = 0;
    
    const world = document.getElementById('game-world');
    const players = {}; 
    const keys = {};
    
    const me = {
        x: window.innerWidth / 2,
        y: window.innerHeight / 2,
        hp: 100,
        color: Math.random() > 0.5 ? '#ff4444' : '#4444ff' // Red or Blue
    };

    window.startGame = () => {
        const roomInput = document.getElementById('room-input').value;
        myName = document.getElementById('name-input').value || "Player";
        if (!roomInput) return alert("Enter a room name!");
        
        document.getElementById('ui').style.display = 'none';
        room = joinRoom(config, roomInput);

        const [updatePos, onPos] = room.makeAction('move');
        const [shoot, onShoot] = room.makeAction('shoot');
        const [hit, onHit] = room.makeAction('hit');

        sendMove = updatePos;
        sendShoot = shoot;
        sendHit = hit;

        createPlayerElement(myId, myName, me.color);

        onPos((data, peerId) => {
            if (!players[peerId]) createPlayerElement(peerId, data.name, data.color);
            updateRemotePlayer(peerId, data);
        });

        onShoot((data) => spawnLaser(data.x, data.y, data.angle, data.color));

        onHit((targetId, shooterId) => {
            if (targetId === myId) {
                me.hp -= 25;
                if (me.hp <= 0) respawn();
            }
            if (shooterId === myId) {
                myScore++;
                document.getElementById('my-score').innerText = myScore;
            }
        });

        requestAnimationFrame(gameLoop);
    };

    function createPlayerElement(id, name, color) {
        const div = document.createElement('div');
        div.id = 'p-' + id;
        div.className = 'player';
        div.innerHTML = `<div class="nametag">${name}</div><div class="cube" style="background: ${color}"></div>`;
        world.appendChild(div);
        players[id] = { x: 0, y: 0, div };
    }

    function updateRemotePlayer(id, data) {
        if (players[id]) {
            players[id].x = data.x;
            players[id].y = data.y;
            players[id].div.style.transform = `translate(${data.x}px, ${data.y}px)`;
        }
    }

    function spawnLaser(x, y, angle, color) {
        const laser = document.createElement('div');
        laser.className = 'laser';
        laser.style.left = x + 'px';
        laser.style.top = y + 'px';
        laser.style.width = '2000px';
        laser.style.transform = `rotate(${angle}rad)`;
        laser.style.background = color;
        world.appendChild(laser);
        setTimeout(() => laser.remove(), 80);
    }

    function respawn() {
        me.x = Math.random() * (window.innerWidth - 50);
        me.y = Math.random() * (window.innerHeight - 50);
        me.hp = 100;
    }

    window.addEventListener('keydown', e => keys[e.code] = true);
    window.addEventListener('keyup', e => keys[e.code] = false);
    
    window.addEventListener('mousedown', e => {
        if (!room) return;
        const centerX = me.x + 25;
        const centerY = me.y + 25;
        const angle = Math.atan2(e.clientY - centerY, e.clientX - centerX);
        
        spawnLaser(centerX, centerY, angle, me.color);
        sendShoot({x: centerX, y: centerY, angle, color: me.color});

        // Simple Hit Detection: Check if click is inside any enemy cube
        Object.keys(players).forEach(id => {
            if (id === myId) return;
            const p = players[id];
            if (e.clientX >= p.x && e.clientX <= p.x + 50 && e.clientY >= p.y && e.clientY <= p.y + 50) {
                sendHit(id, myId);
            }
        });
    });

    function gameLoop() {
        const speed = 6;
        if (keys['KeyW']) me.y -= speed;
        if (keys['KeyS']) me.y += speed;
        if (keys['KeyA']) me.x -= speed;
        if (keys['KeyD']) me.x += speed;

        const myDiv = document.getElementById('p-' + myId);
        if (myDiv) {
            myDiv.style.transform = `translate(${me.x}px, ${me.y}px)`;
            sendMove({x: me.x, y: me.y, name: myName, color: me.color});
        }
        requestAnimationFrame(gameLoop);
    }
</script>
</body>
</html>
