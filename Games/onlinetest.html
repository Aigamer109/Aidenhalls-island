<!DOCTYPE html>
<html>
<head>
    <title>Cube Soccer</title>
    <script src="https://cdn.ably.com"></script>
    <script src="https://cdnjs.cloudflare.com"></script>
    <style>
        body { margin: 0; overflow: hidden; background: #222; font-family: sans-serif; }
        #ui { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); text-align: center; background: rgba(0,0,0,0.8); padding: 30px; border-radius: 15px; color: white; }
        input, button { display: block; width: 200px; margin: 10px auto; padding: 10px; border-radius: 5px; border: none; }
        button { background: #28a745; color: white; cursor: pointer; font-weight: bold; }
        button:hover { background: #218838; }
    </style>
</head>
<body>

<div id="ui">
    <h1>CUBE SOCCER</h1>
    <input type="text" id="username" placeholder="Your Name">
    <button onclick="startMultiplayer()">Quick Match (Join/Host)</button>
    <p id="status">Waiting for input...</p>
</div>

<script>
// --- MULTIPLAYER SETUP ---
const ably = new Ably.Realtime('c5rg5g.YVwTxw:Be3r-ssmhAmLyGFurtKpkoxhdOIPhSeKQY-S3GB8Df4');
const channel = ably.channels.get('soccer-field');
let myId = Math.random().toString(36).substring(7);
let players = {};

// --- 3D SCENE SETUP ---
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
const renderer = new THREE.WebGLRenderer();
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

// Pitch and Ball
const floor = new THREE.Mesh(new THREE.BoxGeometry(20, 0.1, 30), new THREE.MeshStandardMaterial({ color: 0x228b22 }));
scene.add(floor);
const ball = new THREE.Mesh(new THREE.SphereGeometry(0.4), new THREE.MeshStandardMaterial({ color: 0xffffff }));
ball.position.y = 0.5;
scene.add(ball);

// Lighting
const light = new THREE.DirectionalLight(0xffffff, 1);
light.position.set(5, 10, 5);
scene.add(light, new THREE.AmbientLight(0x404040));
camera.position.set(0, 15, 15);
camera.lookAt(0,0,0);

// --- MOVEMENT & SYNC ---
const keys = {};
window.onkeydown = (e) => keys[e.code] = true;
window.onkeyup = (e) => keys[e.code] = false;

function startMultiplayer() {
    const name = document.getElementById('username').value || "Player";
    document.getElementById('ui').style.display = 'none';
    
    // Create my cube
    players[myId] = new THREE.Mesh(new THREE.BoxGeometry(1,1,1), new THREE.MeshStandardMaterial({color: Math.random() * 0xffffff}));
    players[myId].position.y = 0.5;
    scene.add(players[myId]);

    // Send my position
    setInterval(() => {
        channel.publish('pos', { id: myId, x: players[myId].position.x, z: players[myId].position.z });
    }, 50);
}

// Receive other players
channel.subscribe('pos', (msg) => {
    if (msg.data.id === myId) return;
    if (!players[msg.data.id]) {
        players[msg.data.id] = new THREE.Mesh(new THREE.BoxGeometry(1,1,1), new THREE.MeshStandardMaterial({color: 0xff0000}));
        players[msg.data.id].position.y = 0.5;
        scene.add(players[msg.data.id]);
    }
    players[msg.data.id].position.x = msg.data.x;
    players[msg.data.id].position.z = msg.data.z;
});

function animate() {
    requestAnimationFrame(animate);
    if (players[myId]) {
        if (keys['KeyW']) players[myId].position.z -= 0.1;
        if (keys['KeyS']) players[myId].position.z += 0.1;
        if (keys['KeyA']) players[myId].position.x -= 0.1;
        if (keys['KeyD']) players[myId].position.x += 0.1;

        // Simple Ball Kick
        if (players[myId].position.distanceTo(ball.position) < 1) {
            ball.position.x += (ball.position.x - players[myId].position.x) * 0.2;
            ball.position.z += (ball.position.z - players[myId].position.z) * 0.2;
        }
    }
    renderer.render(scene, camera);
}
animate();
</script>
</body>
</html>
