<!DOCTYPE html>
<html>
<head>
    <title>ORBITAL COMMAND: MEGA-PATH</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <style>
        :root { --neon: #00ff41; --dim: #011a01; --bg: #000; --err: #ff3300; }
        body { background: var(--bg); color: var(--neon); font-family: 'Courier New', monospace; margin: 0; overflow: hidden; touch-action: none; }
        #display { width: 100vw; height: 50vh; border-bottom: 2px solid var(--neon); position: relative; background: #000; cursor: grab; }
        canvas { width: 100%; height: 100%; }
        #ui { height: 50vh; padding: 10px; display: grid; grid-template-columns: 1fr 1fr; gap: 10px; background: #050505; box-sizing: border-box; }
        .gauge { border: 1px solid var(--neon); height: 10px; margin: 4px 0; background: var(--dim); }
        .fill { height: 100%; background: var(--neon); width: 100%; transition: width 0.1s linear; }
        .btn-pad { display: grid; grid-template-columns: repeat(3, 1fr); gap: 5px; }
        .btn { border: 1px solid var(--neon); background: var(--dim); color: var(--neon); padding: 10px 2px; text-align: center; font-weight: bold; cursor: pointer; font-size: 10px; user-select: none; }
        .btn:active { background: var(--neon); color: #000; }
        #delay-ind { position: absolute; bottom: 10px; right: 10px; font-size: 10px; color: var(--err); }
        #static { display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255,255,255,0.1); z-index: 10; pointer-events: none; }
    </style>
</head>
<body>

<div id="display">
    <div id="static"></div>
    <canvas id="navCanvas"></canvas>
    <div id="delay-ind">LATENCY: <span id="delay-ms">0</span>ms</div>
    <div style="position: absolute; top: 10px; left: 10px; background: rgba(0,0,0,0.8); padding: 5px; border-left: 2px solid var(--neon); font-size:11px; pointer-events:none;">
        ALT: <span id="alt-txt">0</span> KM | VEL: <span id="vel-txt">0</span> M/S
    </div>
</div>

<div id="ui">
    <div class="telemetry">
        <div style="font-size: 10px;">STAGE <span id="view-stage">1</span> FUEL</div>
        <div class="gauge"><div id="fuel-bar" class="fill"></div></div>
        <div style="font-size: 10px;">BATTERY</div>
        <div class="gauge"><div id="bat-bar" class="fill"></div></div>
        <div style="font-size: 10px; margin-top:5px;">HDG: <span id="hdg-txt">0</span>° | TWR: <span id="twr-txt">0.00</span></div>
        <div id="cmd-status" style="font-size: 9px; color: #aaa; margin-top:5px;">UPLINK STABLE</div>
    </div>
    <div class="btn-pad">
        <div class="btn" onmousedown="rotInput=-0.5" onmouseup="rotInput=0" ontouchstart="rotInput=-0.5" ontouchend="rotInput=0">L-ROT</div>
        <div class="btn" onclick="sendCmd('thrust')">THRUST (T)</div>
        <div class="btn" onmousedown="rotInput=0.5" onmouseup="rotInput=0" ontouchstart="rotInput=0.5" ontouchend="rotInput=0">R-ROT</div>
        <div class="btn" onclick="sendCmd('stage')">STAGE (SPACE)</div>
        <div class="btn" onclick="location.reload()">REBOOT</div>
        <div class="btn" id="sun-ind">SUNLIGHT</div>
    </div>
</div>

<script>
    const canvas = document.getElementById('navCanvas');
    const ctx = canvas.getContext('2d');
    
    const PLANET_R = 150000, ATMO_H = 8000, G_CONSTANT = 35000000; 
    
    let px = 0, py = -PLANET_R - 15, vx = 0, vy = 0, angle = 0;
    let fuel = 100, bat = 100, stageNum = 1, thrusting = false, crashed = false;
    let rotInput = 0, rotVel = 0;

    let camX = 0, camY = -PLANET_R, zoom = 0.2;
    let isDragging = false, lastMouse = {x:0, y:0}, initialPinchDist = null;
    let viewData = { px, py, angle, alt:0, speed:0, fuel:100, twr:0, stage:1 };

    // ZOOM & PAN (MOBILE & DESKTOP)
    canvas.onmousedown = e => { isDragging = true; lastMouse = {x: e.clientX, y: e.clientY}; };
    window.onmousemove = e => {
        if (isDragging) {
            camX -= (e.clientX - lastMouse.x) / zoom;
            camY -= (e.clientY - lastMouse.y) / zoom;
            lastMouse = {x: e.clientX, y: e.clientY};
        }
    };
    window.onmouseup = () => isDragging = false;
    canvas.onwheel = e => { 
        let factor = e.deltaY > 0 ? 0.8 : 1.25;
        zoom = Math.min(10, Math.max(0.000001, zoom * factor));
    };

    canvas.ontouchstart = e => {
        isDragging = true;
        if(e.touches.length === 1) lastMouse = {x: e.touches[0].clientX, y: e.touches[0].clientY};
        if(e.touches.length === 2) initialPinchDist = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
    };
    canvas.ontouchmove = e => {
        if(!isDragging) return;
        if(e.touches.length === 1) {
            camX -= (e.touches[0].clientX - lastMouse.x) / zoom;
            camY -= (e.touches[0].clientY - lastMouse.y) / zoom;
            lastMouse = {x: e.touches[0].clientX, y: e.touches[0].clientY};
        } else if(e.touches.length === 2) {
            let dist = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
            zoom = Math.min(10, Math.max(0.000001, zoom * (dist / initialPinchDist)));
            initialPinchDist = dist;
        }
    };
    canvas.ontouchend = () => { isDragging = false; initialPinchDist = null; };

    function sendCmd(type) {
        let d = Math.sqrt(px*px+py*py);
        let delay = Math.min(3000, 100 + ((d-PLANET_R)*0.01));
        document.getElementById('cmd-status').innerText = "SENDING...";
        setTimeout(() => {
            if(type==='thrust' && !crashed && fuel > 0) thrusting = !thrusting;
            if(type==='stage' && stageNum===1 && !crashed) { stageNum=2; fuel=100; thrusting=false; }
            document.getElementById('cmd-status').innerText = "EXECUTED";
        }, delay);
    }

    function physicsLoop() {
        if(crashed) return;
        let dist = Math.sqrt(px*px+py*py);
        let alt = dist - PLANET_R;
        let gMag = G_CONSTANT / (dist * dist);
        let ax = -(px/dist)*gMag, ay = -(py/dist)*gMag;

        if(alt < ATMO_H) {
            let speed = Math.sqrt(vx*vx+vy*vy);
            let dragMag = Math.exp(-alt / 2500) * speed * speed * 0.00002;
            ax -= (vx/speed) * dragMag || 0; ay -= (vy/speed) * dragMag || 0;
        }

        angle += rotInput ? (rotVel = Math.max(-1.5, Math.min(1.5, rotVel+rotInput*0.05))) : (rotVel *= 0.94);

        let tFac = 0;
        if(thrusting && fuel > 0 && bat > 0) {
            tFac = stageNum === 1 ? 1.12 : 1.35;
            ax += Math.cos((angle-90)*Math.PI/180)*gMag*tFac;
            ay += Math.sin((angle-90)*Math.PI/180)*gMag*tFac;
            fuel -= stageNum === 1 ? 0.012 : 0.005;
            bat -= 0.004;
        }

        vx += ax; vy += ay; px += vx; py += vy;
        if(dist <= PLANET_R) {
            if(Math.sqrt(vx*vx+vy*vy) > 4) { crashed = true; document.getElementById('static').style.display='block'; }
            px = (px/dist)*(PLANET_R+2); py = (py/dist)*(PLANET_R+2); vx=0; vy=0;
        }
        bat = (alt > 3000) ? Math.min(100, bat + 0.01) : Math.max(0, bat - 0.001);
        viewData.rawTwr = tFac;
    }

    function render() {
        canvas.width = canvas.offsetWidth; canvas.height = canvas.offsetHeight;
        ctx.clearRect(0,0,canvas.width,canvas.height);
        ctx.save();
        ctx.translate(canvas.width/2, canvas.height/2);
        ctx.scale(zoom, zoom);
        ctx.translate(-camX, -camY);

        // Planet
        ctx.beginPath(); ctx.arc(0,0, PLANET_R, 0, Math.PI*2);
        ctx.fillStyle = '#011'; ctx.fill(); ctx.strokeStyle = '#0f4'; ctx.lineWidth = 100; ctx.stroke();

        // FULL TRAJECTORY
        ctx.beginPath();
        let tx=px, ty=py, tvx=vx, tvy=vy; ctx.moveTo(tx,ty);
        for(let i=0; i<2500; i++){
            let d = Math.sqrt(tx*tx+ty*ty); if(d < PLANET_R) break;
            let g = G_CONSTANT/(d*d); tvx -= (tx/d)*g; tvy -= (ty/d)*g; tx += tvx * 1.5; ty += tvy * 1.5;
            if(i % 20 == 0) ctx.lineTo(tx,ty);
        }
        ctx.strokeStyle = 'rgba(0,255,65,0.3)'; ctx.lineWidth = 20/zoom; ctx.stroke();

        // INVERSE SCALING ROCKET
        ctx.save();
        ctx.translate(viewData.px, viewData.py); ctx.rotate(viewData.angle*Math.PI/180);
        let s = Math.min(1000, Math.max(1, 0.4 / zoom)); 
        ctx.scale(s, s);
        ctx.beginPath(); ctx.moveTo(0,-30); ctx.lineTo(15,20); ctx.lineTo(-15,20); ctx.closePath();
        ctx.fillStyle = thrusting ? "#fff" : "#0f4"; ctx.fill();
        ctx.restore();

        ctx.restore();
        if(!isDragging) { camX += (px-camX)*0.1; camY += (py-camY)*0.1; }
        requestAnimationFrame(render);
    }

    function telemetry() {
        if(crashed) return;
        let d = Math.sqrt(px*px+py*py);
        setTimeout(() => {
            viewData = { px, py, angle, alt: d-PLANET_R, speed: Math.sqrt(vx*vx+vy*vy), fuel, twr: viewData.rawTwr, stage: stageNum };
            document.getElementById('alt-txt').innerText = (viewData.alt/10).toFixed(0);
            document.getElementById('vel-txt').innerText = (viewData.speed*100).toFixed(0);
            document.getElementById('hdg-txt').innerText = Math.floor(viewData.angle % 360);
            document.getElementById('fuel-bar').style.width = viewData.fuel+"%";
            document.getElementById('bat-bar').style.width = bat.toFixed(0)+"%";
            document.getElementById('delay-ms').innerText = Math.floor(100 + ((d-PLANET_R)*0.01));
            document.getElementById('twr-txt').innerText = viewData.twr.toFixed(2);
            document.getElementById('view-stage').innerText = viewData.stage;
            telemetry();
        }, 150);
    }

    window.addEventListener('keydown', e => { if(e.key==='t') sendCmd('thrust'); if(e.key===' ') sendCmd('stage'); if(e.key==='a') rotInput = -0.5; if(e.key==='d') rotInput = 0.5; });
    window.addEventListener('keyup', e => { if(e.key==='a'||e.key==='d') rotInput=0; });
    setInterval(physicsLoop, 16);
    telemetry(); render();
</script>
</body>
</html>
